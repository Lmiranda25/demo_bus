<div class="container mx-auto max-w-5xl px-4 py-8">
  <div class="flex items-center gap-3 mb-6">
    <button onclick="Router.go('/resultados')" class="text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Volver a horarios
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Mapa de asientos -->
    <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h3 class="text-xl font-bold text-slate-800 mb-1">Selecciona tus asientos</h3>
      <div class="text-sm text-slate-500 mb-1">
        <span id="info-ruta" class="font-semibold text-slate-700"></span> ·
        <span id="info-fecha"></span> · 🕐 <span id="info-hora"></span>
      </div>
      <div class="text-sm text-slate-500 mb-5">
        🚌 <span id="info-servicio"></span> — <span id="info-bus"></span> ·
        💰 <span id="info-precio"></span> por asiento
      </div>

      <!-- Leyenda -->
      <div class="flex gap-5 mb-6 text-xs flex-wrap">
        <div class="flex items-center gap-1.5"><div class="w-5 h-5 rounded-md bg-slate-200 border border-slate-300"></div> Disponible</div>
        <div class="flex items-center gap-1.5"><div class="w-5 h-5 rounded-md bg-emerald-500"></div> Seleccionado</div>
        <div class="flex items-center gap-1.5"><div class="w-5 h-5 rounded-md bg-slate-400 opacity-60"></div> Ocupado</div>
      </div>

      <!-- Tabs de piso (para buses Cama) -->
      <div id="pisos-tabs" class="flex gap-2 mb-4 hidden">
        <button class="tab-piso px-4 py-2 rounded-lg text-sm font-bold border border-slate-300 bg-blue-600 text-white" data-piso="p1">Piso 1</button>
        <button class="tab-piso px-4 py-2 rounded-lg text-sm font-bold border border-slate-300 text-slate-600 hover:bg-slate-50" data-piso="p2">Piso 2</button>
      </div>

      <!-- Representación del bus -->
      <div class="border-4 border-slate-200 rounded-3xl bg-slate-50 p-5 overflow-x-auto">
        <!-- Conductor -->
        <div class="flex items-center gap-3 mb-6 border-b-2 border-slate-200 pb-4">
          <div class="w-9 h-9 rounded-full border-2 border-slate-300 flex items-center justify-center text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Conductor</span>
          <div class="ml-auto flex gap-3">
            <div class="w-8 h-6 rounded border-2 border-slate-300 bg-white text-slate-400">
              <svg class="w-full h-full p-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 4v8l4 4"/></svg>
            </div>
          </div>
        </div>

        <!-- Paneles de piso -->
        <div id="piso-p1" class="piso-panel">
          <div id="seat-map-p1" class="seat-grid-4col"></div>
        </div>
        <div id="piso-p2" class="piso-panel hidden">
          <div id="seat-map-p2" class="seat-grid-4col"></div>
        </div>
      </div>
    </div>

    <!-- Resumen -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-20">
        <h3 class="text-lg font-bold mb-4 border-b border-slate-100 pb-3">Resumen de compra</h3>
        <div class="space-y-3 mb-5 text-sm">
          <div class="flex justify-between"><span class="text-slate-500">Servicio:</span><strong id="info-servicio-res" class="text-slate-800">-</strong></div>
          <div class="flex justify-between"><span class="text-slate-500">Fecha:</span><strong id="res-fecha" class="text-slate-800">-</strong></div>
          <div class="flex justify-between"><span class="text-slate-500">Asientos:</span><strong id="res-asientos" class="text-slate-800">Ninguno</strong></div>
          <div class="flex justify-between"><span class="text-slate-500">Precio c/u:</span><strong id="info-precio-res" class="text-slate-800">-</strong></div>
        </div>
        <div class="border-t border-slate-200 pt-4 mb-5">
          <div class="flex justify-between items-center">
            <span class="font-bold text-slate-700">Total:</span>
            <span class="text-2xl font-black text-blue-600" id="res-total">S/ 0.00</span>
          </div>
          <p class="text-xs text-slate-400 mt-1">Máximo 4 asientos por compra</p>
        </div>
        <button id="btn-continue" disabled onclick="Router.go('/checkout')"
          class="w-full bg-slate-200 text-slate-400 font-bold py-3 px-4 rounded-xl cursor-not-allowed flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          Continuar al pago
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// Sync resumen secundario con el principal
const syncResumen = () => {
  const srv = document.getElementById('info-servicio');
  const srvR = document.getElementById('info-servicio-res');
  const prR = document.getElementById('info-precio-res');
  const prMain = document.getElementById('info-precio');
  const fR = document.getElementById('res-fecha');
  const fMain = document.getElementById('info-fecha');
  if(srv && srvR) srvR.textContent = srv.textContent;
  if(prMain && prR) prR.textContent = prMain.textContent;
  if(fMain && fR) fR.textContent = fMain.textContent;
};
requestAnimationFrame(syncResumen);
</script>

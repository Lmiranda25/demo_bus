<div class="container mx-auto max-w-4xl px-4 py-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-2">Mis Reservas</h1>
  <p class="text-slate-500 text-sm mb-6">Historial de todos tus viajes</p>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-2xl border border-slate-200 p-4 text-center shadow-sm">
      <p class="text-2xl font-black text-slate-800" id="stat-total">0</p>
      <p class="text-xs text-slate-500 mt-1">Total</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 p-4 text-center shadow-sm">
      <p class="text-2xl font-black text-emerald-600" id="stat-pagadas">0</p>
      <p class="text-xs text-slate-500 mt-1">Pagadas</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 p-4 text-center shadow-sm">
      <p class="text-2xl font-black text-blue-600" id="stat-gastado">S/ 0</p>
      <p class="text-xs text-slate-500 mt-1">Gastado</p>
    </div>
  </div>

  <div id="reservas-list" class="space-y-4">
    <div class="flex justify-center py-10">
      <div class="animate-spin w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full"></div>
    </div>
  </div>
</div>

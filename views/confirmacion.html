<div class="container mx-auto max-w-2xl px-4 py-12 ticket-print">
  <!-- Animación de éxito -->
  <div class="text-center mb-8">
    <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-5 relative">
      <svg class="w-12 h-12 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
      <div class="absolute inset-0 rounded-full animate-ping bg-emerald-200 opacity-30"></div>
    </div>
    <h1 class="text-3xl font-black text-slate-800">¡Compra Exitosa!</h1>
    <p class="text-slate-500 mt-2">Tu boleto ha sido enviado por correo y WhatsApp</p>
  </div>

  <!-- Boleto -->
  <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden mb-6">
    <!-- Header ticket -->
    <div class="bg-corporate-900 text-white px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="h-7 w-7 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="2" y="7" width="20" height="12" rx="2" stroke-width="2"/>
          <path d="M2 11h20M7 19v2M17 19v2" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="font-bold text-lg">Trans<span class="text-blue-400">Corp</span></span>
      </div>
      <span class="bg-emerald-500 text-white text-xs font-black px-3 py-1 rounded-full">✓ PAGADO</span>
    </div>

    <!-- Cuerpo del boleto -->
    <div class="relative px-8 py-6">
      <div class="ticket-punch-l"></div>
      <div class="ticket-punch-r"></div>

      <!-- Código -->
      <div class="border-b-2 border-dashed border-slate-300 pb-5 mb-5">
        <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Código de Reserva</p>
        <p class="text-2xl font-mono font-black text-slate-800" id="conf-codigo">TRX-XXXXXX</p>
      </div>

      <!-- Ruta visual -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-xs text-slate-500 mb-0.5">Origen</p>
          <p class="text-2xl font-black text-slate-800" id="conf-origen">-</p>
        </div>
        <div class="flex-1 flex flex-col items-center px-4">
          <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <div class="flex-1 h-px w-full bg-slate-300 mt-2 relative"><div class="absolute right-0 -top-1 w-2 h-2 bg-blue-600 rounded-full"></div></div>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-500 mb-0.5">Destino</p>
          <p class="text-2xl font-black text-slate-800" id="conf-destino">-</p>
        </div>
      </div>

      <!-- Detalles -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 text-sm">
        <div>
          <span class="text-slate-500 block text-xs mb-0.5">Pasajero</span>
          <strong class="text-slate-800" id="conf-pasajero">-</strong>
        </div>
        <div>
          <span class="text-slate-500 block text-xs mb-0.5">Ruta</span>
          <strong class="text-slate-800" id="conf-ruta">-</strong>
        </div>
        <div>
          <span class="text-slate-500 block text-xs mb-0.5">Fecha y Hora</span>
          <strong class="text-slate-800" id="conf-fecha">-</strong>
        </div>
        <div>
          <span class="text-slate-500 block text-xs mb-0.5">Asientos</span>
          <strong class="text-slate-800" id="conf-asientos">-</strong>
        </div>
        <div>
          <span class="text-slate-500 block text-xs mb-0.5">Servicio</span>
          <strong class="text-slate-800" id="conf-bus">-</strong>
        </div>
        <div>
          <span class="text-slate-500 block text-xs mb-0.5">Método de pago</span>
          <strong class="text-slate-800" id="conf-metodo">-</strong>
        </div>
      </div>

      <!-- Total -->
      <div class="mt-5 pt-4 border-t border-slate-200 flex justify-between items-center">
        <span class="text-slate-500 text-sm">Total pagado</span>
        <span class="text-2xl font-black text-blue-600" id="conf-total">S/ 0.00</span>
      </div>
    </div>
  </div>

  <!-- Acciones -->
  <div class="flex gap-3 justify-center flex-wrap no-print">
    <button id="btn-nueva" class="flex items-center gap-2 px-6 py-3 border border-slate-300 text-slate-700 hover:bg-slate-50 font-bold rounded-xl transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Nueva búsqueda
    </button>
    <button id="btn-pdf" class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      Descargar / Imprimir
    </button>
    <a href="#/mis-reservas" class="flex items-center gap-2 px-6 py-3 border border-blue-300 text-blue-700 hover:bg-blue-50 font-bold rounded-xl transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Mis Reservas
    </a>
  </div>
</div>

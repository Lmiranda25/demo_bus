<div class="min-h-screen flex items-center justify-center py-12 px-4 bg-slate-50">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="#/" class="inline-flex items-center gap-2">
        <svg class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="2" y="7" width="20" height="12" rx="2" stroke-width="2"/>
          <path d="M2 11h20M7 19v2M17 19v2M6 7V5a2 2 0 012-2h8a2 2 0 012 2v2" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="text-2xl font-black text-corporate-900">Trans<span class="text-blue-600">Corp</span></span>
      </a>
      <h1 class="text-2xl font-bold text-slate-800 mt-4">Crea tu cuenta</h1>
      <p class="text-slate-500 text-sm mt-1">Es gratis y tarda menos de 1 minuto</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8">
      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1.5">Nombre completo</label>
          <input id="nombre" type="text" placeholder="Juan Pérez" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">DNI</label>
            <input id="dni" type="text" placeholder="12345678" maxlength="8"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">Teléfono / WhatsApp</label>
            <input id="telefono" type="tel" placeholder="987654321"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1.5">Correo electrónico</label>
          <input id="email" type="email" placeholder="tu@correo.com" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1.5">Contraseña</label>
          <input id="password" type="password" placeholder="Mínimo 6 caracteres" required minlength="6"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1.5">Confirmar contraseña</label>
          <input id="confirm-password" type="password" placeholder="Repite la contraseña" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow transition flex items-center justify-center gap-2 text-base mt-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
          Crear cuenta gratis
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      ¿Ya tienes cuenta? <a href="#/login" class="text-blue-600 font-bold hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>

<div class="container mx-auto max-w-3xl px-4 py-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">Mi Perfil</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Avatar + stats -->
    <div class="md:col-span-1">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 text-center">
        <div class="w-20 h-20 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl font-black mx-auto mb-3" id="avatar-initials">??</div>
        <div class="space-y-2 text-sm mt-4">
          <div class="flex justify-between"><span class="text-slate-500">Reservas</span><strong id="p-stat-reservas">0</strong></div>
          <div class="flex justify-between"><span class="text-slate-500">Pagadas</span><strong class="text-emerald-600" id="p-stat-pagadas">0</strong></div>
          <div class="flex justify-between"><span class="text-slate-500">Total gastado</span><strong class="text-blue-600" id="p-stat-gastado">S/ 0</strong></div>
          <div class="flex justify-between text-xs"><span class="text-slate-400">Miembro desde</span><span class="text-slate-500" id="p-miembro-desde">-</span></div>
        </div>
      </div>
    </div>

    <!-- Formularios -->
    <div class="md:col-span-2 space-y-6">
      <!-- Datos personales -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <h2 class="font-bold text-slate-800 mb-4">Datos Personales</h2>
        <form id="perfil-form" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-600 mb-1.5">Nombre completo</label>
            <input id="p-nombre" type="text" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1.5">DNI</label>
              <input id="p-dni" type="text" maxlength="8" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1.5">Teléfono</label>
              <input id="p-telefono" type="tel" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
            </div>
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-600 mb-1.5">Correo electrónico</label>
            <input id="p-email" type="email" disabled class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 text-slate-400 cursor-not-allowed">
          </div>
          <button type="submit" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow transition">
            Guardar cambios
          </button>
        </form>
      </div>

      <!-- Cambiar contraseña -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <h2 class="font-bold text-slate-800 mb-4">Cambiar Contraseña</h2>
        <form id="password-form" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-600 mb-1.5">Contraseña actual</label>
            <input id="p-pass-actual" type="password" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1.5">Nueva contraseña</label>
              <input id="p-pass-nueva" type="password" minlength="6" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1.5">Confirmar nueva</label>
              <input id="p-pass-confirmar" type="password" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
            </div>
          </div>
          <button type="submit" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl shadow transition">
            Actualizar contraseña
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
